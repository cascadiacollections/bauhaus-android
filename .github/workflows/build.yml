name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Install Android SDK platform
        run: ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "platforms;android-36"

      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.jks
          echo "KEYSTORE_PATH=/tmp/release.jks" >> $GITHUB_ENV
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build, Lint, and Test
        run: ./gradlew assembleFossRelease assembleFossDebug lintFossDebug testFossDebugUnitTest jacocoTestReport --no-daemon --parallel --build-cache
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Test Report
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Unit Tests
          path: '**/build/test-results/**/TEST-*.xml'
          reporter: java-junit

      - name: Coverage Threshold
        run: |
          REPORT=app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          if [ ! -f "$REPORT" ]; then echo "JaCoCo report not found"; exit 1; fi
          LINE_COUNTER=$(grep -o 'type="LINE" missed="[0-9]*" covered="[0-9]*"' "$REPORT" | tail -1)
          MISSED=$(echo "$LINE_COUNTER" | sed 's/.*missed="\([0-9]*\)".*/\1/')
          COVERED=$(echo "$LINE_COUNTER" | sed 's/.*covered="\([0-9]*\)".*/\1/')
          TOTAL=$((MISSED + COVERED))
          if [ "$TOTAL" -eq 0 ]; then echo "No line data"; exit 1; fi
          PCT=$((COVERED * 100 / TOTAL))
          echo "Line coverage: ${PCT}% (${COVERED}/${TOTAL})"
          if [ "$PCT" -lt 1 ]; then echo "::error::Coverage ${PCT}% is below 1% threshold"; exit 1; fi

      - name: APK & AAB Size
        run: |
          echo "## Build Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|" >> $GITHUB_STEP_SUMMARY
          for f in app/build/outputs/apk/foss/release/app-foss-release*.apk app/build/outputs/apk/foss/debug/app-foss-debug.apk; do
            if [ -f "$f" ]; then
              SIZE=$(du -h "$f" | cut -f1)
              echo "| $(basename $f) | $SIZE |" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.sha }}
          path: app/build/reports/jacoco/jacocoTestReport/html/
          retention-days: 7

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-${{ github.sha }}
          path: app/build/reports/lint-results-fossDebug*.html
          retention-days: 7

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: apks-${{ github.sha }}
          path: |
            app/build/outputs/apk/foss/release/app-foss-release*.apk
            app/build/outputs/apk/foss/debug/app-foss-debug.apk
          retention-days: 1

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v7
        with:
          name: aab-${{ github.sha }}
          path: app/build/outputs/bundle/fossRelease/app-foss-release.aab
          retention-days: 1

  check-nightly:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Compare SHA to last nightly
        id: check
        run: |
          LAST=$(gh release view nightly-build --repo ${{ github.repository }} --json targetCommitish -q .targetCommitish 2>/dev/null || echo "none")
          echo "changed=$([ "$LAST" != "${{ github.sha }}" ] && echo true || echo false)" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: [build, check-nightly]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.check-nightly.outputs.changed == 'true'
    permissions:
      contents: write

    steps:
      - name: Download APK Artifacts
        uses: actions/download-artifact@v8
        with:
          name: apks-${{ github.sha }}
          path: apks

      - name: Download AAB Artifact
        uses: actions/download-artifact@v8
        with:
          name: aab-${{ github.sha }}
          path: aab
        continue-on-error: true

      - name: List downloaded artifacts
        run: find apks -type f; find aab -type f 2>/dev/null || true

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Update nightly release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly-build
          token: ${{ secrets.GITHUB_TOKEN }}
          name: "Nightly Build (${{ steps.date.outputs.date }})"
          body: |
            ## 🌙 Nightly Build

            **Commit:** ${{ github.sha }}
            **Date:** ${{ steps.date.outputs.date }}
            **Short SHA:** ${{ steps.sha.outputs.short }}

            ### Downloads
            | Variant | Description |
            |---------|-------------|
            | `app-foss-release.apk` | FOSS release (no Google dependencies) |
            | `app-full-release.apk` | Full release with Firebase Crashlytics |
            | `app-foss-debug.apk` | Debug build with LeakCanary |

            ### Installation
            1. Download the APK for your use case
            2. Enable "Install from unknown sources" on your device
            3. Install the APK

            ---
            _This release is automatically replaced on each commit to main._
          files: |
            apks/release/app-foss-release*.apk
            apks/debug/app-foss-debug.apk
          prerelease: true
          make_latest: false
        continue-on-error: true

      - name: Delete Artifacts
        uses: geekyeggo/delete-artifact@v6
        with:
          name: |
            apks-${{ github.sha }}
            aab-${{ github.sha }}

  deploy-internal:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download AAB Artifact
        uses: actions/download-artifact@v8
        with:
          name: aab-${{ github.sha }}
          path: aab
        continue-on-error: true

      - name: Upload to Play Store internal track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.cascadiacollections.bauhaus
          releaseFiles: aab/app-release.aab
          track: internal
          status: completed
        continue-on-error: true

